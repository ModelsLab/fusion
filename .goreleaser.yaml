version: 2

project_name: fusion

before:
  hooks:
    - go run ./scripts/build_knowledge_db.go
    - go mod tidy
    - go test ./...

builds:
  - id: fusion
    main: ./cmd/fusion
    binary: fusion
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: fusion
    builds:
      - fusion
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

release:
  github:
    owner: ModelsLab
    name: fusion

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
